# AssetFlow AI — nginx site config (Option A: all-in-one EC2)
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/assetflow
#   sudo ln -sf /etc/nginx/sites-available/assetflow /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Adjust `root` if the repo is cloned somewhere other than /home/ubuntu/AssetFlow-AI.

server {
    listen 80;
    server_name _;

    root /home/ubuntu/AssetFlow-AI/frontend/dist;
    index index.html;

    # React SPA (TanStack Router client routes)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI API (same-origin when VITE_API_BASE_URL=/api/v1)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Assistant / pipeline can take longer than default
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health probes and OpenAPI docs
    location ~ ^/(health|ready|docs|openapi.json|redoc) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
